# Docker 环境：容器内通过服务名访问 MySQL / Redis / RocketMQ
# 启动: docker compose up -d --build
spring:
  profiles:
    include: mysql

  datasource:
    url: jdbc:mysql://mysql:3306/learning_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true

  data:
    redis:
      host: redis
      port: 6379

rocketmq:
  name-server: rocketmq-namesrv:9876
  consumer:
    enabled: true
